

<!-- Slideshow container -->
<div class="items.css/slideshow-container">

  <!-- Full-width images with number and caption text -->
  <div class="items.css/mySlides fade">
    <div class="items.css/numbertext">1 / 3</div>
    <img src="pictures/iglogo.png" style="width:100%">
  </div>

  <div class="items.css/mySlides fade">
    <div class="items.css/numbertext">2 / 3</div>
    <img src="pictures/ig_logo_2.png" style="width:100%">
  </div>

  <div class="items.css/mySlides fade">
    <div class="items.css/numbertext">3 / 3</div>
    <img src="pictures/islogo.png" style="width:100%">
  </div>

  <!-- Next and previous buttons -->
  <a class="items.css/prev" onclick="plusSlides(-1)">&#10094;</a>
  <a class="items.css/next" onclick="plusSlides(1)">&#10095;</a>
</div>
<br>

<!-- The dots/circles -->
<div style="text-align:center">
  <span class="items.css/dot" onclick="currentSlide(1)"></span>
  <span class="items.css/dot" onclick="currentSlide(2)"></span>
  <span class="items.css/dot" onclick="currentSlide(3)"></span>
</div>
